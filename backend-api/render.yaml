services:
  - type: web
    name: nexo-leads-api
    runtime: node
    buildCommand: cd backend-api && npm install
    startCommand: cd backend-api && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: CORS_ORIGIN
        value: https://nexoleads.inmoworkingpro.es
      - key: LOGIN_PASSWORD
        value: nexoleads123
